            setLoading(false);
          });
      }, []);

      const hasChanges = useMemo(() => {
        return JSON.stringify(scenes) !== JSON.stringify(originalScenes);
      }, [scenes, originalScenes]);

      // Push to undo stack
      const pushUndo = useCallback((currentScenes) => {
        setUndoStack(prev => {
          const next = [JSON.stringify(currentScenes), ...prev];
          return next.slice(0, 20);
        });
      }, []);

      // Operations
      const handleSplit = useCallback((sceneIdx, splitSubIdx) => {
        setScenes(prev => {
          pushUndo(prev);
          const result = splitScene(prev, sceneIdx, splitSubIdx);
          if (result.length === prev.length) {
            setToast({ message: '나눌 수 없습니다', type: 'error' });
            return prev;
          }
          setToast({ message: `씬 #${sceneIdx + 1} 분할됨`, type: 'success' });
          return result;
        });
      }, [pushUndo]);

      const handleMerge = useCallback((idxA, idxB) => {
        setScenes(prev => {
          const a = prev[idxA], b = prev[idxB];
          if ((a.subtitles?.length || 0) + (b.subtitles?.length || 0) > 10) {
            setToast({ message: '병합 시 10자막 초과', type: 'error' });
            return prev;
          }
          pushUndo(prev);
          const result = mergeScenes(prev, idxA, idxB);
          setToast({ message: `씬 #${idxA + 1} + #${idxB + 1} 병합됨`, type: 'success' });
          return result;
        });
      }, [pushUndo]);

      const handleMoveUp = useCallback((sceneIdx) => {
        setScenes(prev => {
          pushUndo(prev);
          const result = moveSubtitle(prev, sceneIdx, 'up');
          if (result === prev) {
            setToast({ message: '이동할 수 없습니다', type: 'error' });
            return prev;
          }
          setToast({ message: `자막을 씬 #${sceneIdx}로 이동`, type: 'info' });
          return result;
        });
      }, [pushUndo]);

      const handleMoveDown = useCallback((sceneIdx) => {
        setScenes(prev => {
          pushUndo(prev);
          const result = moveSubtitle(prev, sceneIdx, 'down');
          if (result === prev) {
            setToast({ message: '이동할 수 없습니다', type: 'error' });
            return prev;
          }
          setToast({ message: `자막을 씬 #${sceneIdx + 2}로 이동`, type: 'info' });
          return result;
        });
      }, [pushUndo]);

      const handleUndo = useCallback(() => {
        setUndoStack(prev => {
          if (prev.length === 0) return prev;
          const [last, ...rest] = prev;
          setScenes(JSON.parse(last));
          setToast({ message: '되돌리기 완료', type: 'info' });
          return rest;
        });
      }, []);

      const handleSave = useCallback(async () => {
        if (!hasChanges || saving) return;
        setSaving(true);
        try {
          const res = await fetch(API_BASE + '/api/scenes', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(scenes),
          });
          const data = await res.json();
          if (data.ok) {
            setOriginalScenes(JSON.parse(JSON.stringify(scenes)));
            setUndoStack([]);
            setToast({ message: `저장 완료 (${data.count}씬)`, type: 'success' });
          } else {
            setToast({ message: '저장 실패', type: 'error' });
          }
        } catch (err) {
          setToast({ message: '저장 실패: ' + err.message, type: 'error' });
        }
        setSaving(false);
      }, [scenes, hasChanges, saving]);

      const scrollToScene = useCallback((idx) => {
        sceneRefs.current[idx]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, []);

      // updateScene: 의미 탭에서 개별 씬 업데이트
      const updateScene = useCallback((sceneIdx, updatedScene) => {
        setScenes(prev => {
          const next = prev.map((s, i) => i === sceneIdx ? updatedScene : s);
          setToast({ message: `씬 #${sceneIdx + 1} 의미 분석 업데이트됨`, type: 'success' });
          return next;
        });
      }, []);

      // pushUndoForMeaning: 의미 탭 변경 전 현재 상태 저장
      const pushUndoForMeaning = useCallback(() => {
        setScenes(prev => {
          pushUndo(prev);
          return prev;
        });
      }, [pushUndo]);

      // Keyboard shortcuts
      useEffect(() => {
        function onKeyDown(e) {
          if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
            e.preventDefault();
            handleUndo();
          }
          if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            handleSave();
          }
        }
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, [handleUndo, handleSave]);

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen">
            <div className="text-txt-muted text-sm">로딩 중...</div>
          </div>
        );
      }

      if (error) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-3">
            <div className="text-accent-red text-sm">{error}</div>
            <div className="text-txt-muted text-xs">npm run editor 로 서버를 먼저 실행하세요</div>
          </div>
        );
      }

      const selectedScene = scenes[selectedSceneIdx] || null;

      return (
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
          {/* Header */}
          <Header scenes={scenes} hasChanges={hasChanges} onSave={handleSave} saving={saving} />

          {/* Timeline MiniBar */}
          <div className="max-w-7xl mx-auto w-full pt-3 px-0">
            <TimelineMiniBar scenes={scenes} scrollToScene={scrollToScene} />
          </div>

          {/* TabBar */}
          <div className="max-w-7xl mx-auto w-full">
            <TabBar activeTab={activeTab} onTabChange={setActiveTab} />
          </div>

          {/* Main Layout: Sidebar + Content */}
          <div
            style={{
              display: 'flex',
              flex: 1,
              maxWidth: 1280,
              width: '100%',
              margin: '0 auto',
              minHeight: 0,
              height: 'calc(100vh - 120px)',
            }}
          >
            {/* Scene List Sidebar — shared across all tabs */}
            <SceneListSidebar
              scenes={scenes}
              selectedIdx={selectedSceneIdx}
              onSelect={setSelectedSceneIdx}
              sceneRefs={sceneRefs}
            />

            {/* Tab Content */}
            <div style={{ flex: 1, overflowY: 'auto', minWidth: 0 }}>
              {activeTab === 'structure' && (
                <StructureTab
                  scenes={scenes}
                  onSplit={handleSplit}
                  onMoveUp={handleMoveUp}
                  onMoveDown={handleMoveDown}
                  onMerge={handleMerge}
                  sceneRefs={sceneRefs}
                />
              )}
              {activeTab === 'meaning' && (
                <MeaningTab
                  scene={selectedScene}
                  sceneIdx={selectedSceneIdx}
                  updateScene={updateScene}
                  pushUndo={pushUndoForMeaning}
                />
              )}
              {activeTab === 'preview' && (
                <PreviewTab
                  scene={selectedScene}
                  onUpdateScene={(updatedScene) => updateScene(selectedSceneIdx, updatedScene)}
                  onPushUndo={pushUndoForMeaning}
                />
              )}
            </div>
          </div>

          <UndoBar undoCount={undoStack.length} onUndo={handleUndo} />
          {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
